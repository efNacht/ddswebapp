{% extends "base.html" %}
{% block title %}Отчёты{% endblock %}
{% block content %}
<div class="reports-page">
    <div class="page-header">
        <h1>Отчёты</h1>
        <button class="btn btn-primary" onclick="downloadAll()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Скачать все
        </button>
    </div>

    <div class="reports-grid" id="reportsGrid">
        <div class="loading">Загрузка списка отчётов...</div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const REPORT_ICONS = {
    'dds': '<svg viewBox="0 0 24 24"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>',
    'pl': '<svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>',
    'dds-template': '<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>',
    'pl-template': '<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>',
    'reconciliation': '<svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>',
    'tax': '<svg viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>',
    'helpdesk': '<svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
};

const REPORT_DESCRIPTIONS = {
    'dds': 'Движение денежных средств — все статьи с разбивкой по месяцам',
    'pl': 'Отчёт о прибылях и убытках с расчётом маржинальности',
    'dds-template': 'Шаблон компании: столбцы "факт" заполнены из банковской выписки',
    'pl-template': 'Шаблон компании PL: фактические расходы из банка по статьям',
    'reconciliation': 'Сверка поступлений OpenPay / MercadoPago с банковской выпиской',
    'tax': 'Налоговые платежи: ИСР, ИВА, взносы — помесячно с анализом НДС',
    'helpdesk': 'Данные партнёра HELPDESK: возвраты, списания, MercadoPago комиссии',
};

async function loadReports() {
    const res = await fetch('/api/reports/list');
    const data = await res.json();
    const grid = document.getElementById('reportsGrid');

    grid.innerHTML = data.reports.map(r => `
        <div class="report-card ${r.available ? '' : 'disabled'}">
            <div class="report-icon">${REPORT_ICONS[r.key] || REPORT_ICONS['dds-template']}</div>
            <div class="report-info">
                <h3>${r.title}</h3>
                <p>${REPORT_DESCRIPTIONS[r.key] || ''}</p>
                <span class="report-meta">${r.available ? r.size_kb + ' KB · создан ' + r.generated_at : 'Не сгенерирован'}</span>
            </div>
            <div>
                ${r.available
                    ? `<a href="/api/reports/${r.key}" download="${r.filename}" class="btn btn-primary btn-sm">Скачать</a>`
                    : '<span class="btn-disabled">Недоступен</span>'
                }
            </div>
        </div>
    `).join('');
}

function downloadAll() {
    const links = document.querySelectorAll('.report-card:not(.disabled) a.btn');
    links.forEach((a, i) => setTimeout(() => a.click(), i * 500));
}

document.addEventListener('DOMContentLoaded', loadReports);
</script>
{% endblock %}
