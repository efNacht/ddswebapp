<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FL Cosmetics — {% block title %}Financial Reports{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <span class="logo">FL</span> Cosmetics Mexico
        </div>
        <div class="nav-links">
            <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">Загрузка</a>
            <a href="/dashboard" class="nav-link {% if request.path == '/dashboard' %}active{% endif %}">Dashboard</a>
            <a href="/transactions" class="nav-link {% if request.path == '/transactions' %}active{% endif %}">Транзакции</a>
            <a href="/reports" class="nav-link {% if request.path == '/reports' %}active{% endif %}">Отчёты</a>
            <button class="btn btn-reset-nav" onclick="resetData()" title="Удалить все данные и начать заново">↺ Сброс</button>
        </div>
        <script>
        async function resetData() {
            if (!confirm('Удалить все данные и отчёты? Начнём заново.')) return;
            await fetch('/api/reset', { method: 'POST' });
            window.location.href = '/';
        }
        </script>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <script src="/static/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
